name: Build & Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/atd   # adjust if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/atd   # where your Dockerfile is
          push: true
          tags: myaccess2021/atd-backend:latest
      
      - name: Test Server SSH Port
        run: |
          echo "Testing SSH port..."
          nc -vz -w 15 ${{ secrets.DEPLOY_HOST }} 22

      - name: Deploy to Dedicated Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            docker pull myaccess2021/atd-backend:latest
            docker stop atd-backend || true
            docker rm -f atd-backend || true
            sleep 2
            # Kill any leftover container on port 8003
            CONTAINER_ON_PORT=$(docker ps -q --filter "publish=8003")
            if [ -n "$CONTAINER_ON_PORT" ]; then
              docker stop $CONTAINER_ON_PORT
              docker rm -f $CONTAINER_ON_PORT
            fi
            docker run -d \
              --name atd-backend \
              -p 8003:8000 \
              myaccess2021/atd-backend:latest
          # script: |
          #   docker pull myaccess2021/atd-backend:latest
          #   docker stop atd-backend || true
          #   docker rm atd-backend || true
          #   docker run -d \
          #     --name atd-backend \
          #     -p 8003:8000 \
          #     myaccess2021/atd-backend:latest
